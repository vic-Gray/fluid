name: Monthly Transparency Report

on:
  schedule:
    # Run on the 1st of every month at 08:00 UTC — after the month closes
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "Manual trigger"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-report:
    name: Generate and publish monthly report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate report
        env:
          DATABASE_URL: ${{ secrets.REPORT_DATABASE_URL }}
          FLUID_METRICS_URL: ${{ secrets.REPORT_FLUID_METRICS_URL }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.REPORT_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.REPORT_SMTP_PORT }}
          SMTP_USER: ${{ secrets.REPORT_SMTP_USER }}
          SMTP_PASS: ${{ secrets.REPORT_SMTP_PASS }}
        run: node scripts/generate-monthly-report.mjs

      - name: Commit and open PR with new report
        run: |
          MONTH=$(date -d "1 month ago" +"%Y-%m" 2>/dev/null || date -v-1m +"%Y-%m")
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="report/monthly-${MONTH}"
          git checkout -b "${BRANCH}"
          git add docs/reports/
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "community: auto-generated monthly transparency report for ${MONTH}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "Monthly transparency report — ${MONTH}" \
            --body "Auto-generated by the \`monthly-report\` workflow.

Adds \`docs/reports/${MONTH}.md\` with network activity stats for the previous month.

Closes: see issue #256" \
            --base main \
            --head "${BRANCH}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
