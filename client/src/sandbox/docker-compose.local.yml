services:
  postgres:
    image: postgres:16-alpine
    container_name: fluid-sandbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fluid
      POSTGRES_USER: fluid
      POSTGRES_PASSWORD: fluid
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluid -d fluid"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-horizon:
    image: ealen/echo-server:0.9.2
    container_name: fluid-sandbox-mock-horizon
    restart: unless-stopped
    ports:
      - "18080:80"

  fluid:
    build:
      context: ../../fluid-server
      dockerfile: Dockerfile
    container_name: fluid-sandbox-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mock-horizon:
        condition: service_started
    environment:
      FLUID_SERVER_PORT: "8080"
      FLUID_DATABASE_URL: "postgres://fluid:fluid@postgres:5432/fluid"
      FLUID_HORIZON_URL: "http://mock-horizon"
      FLUID_ADMIN_TOKEN: "local-dev-admin-token"
    ports:
      - "18081:8080"
